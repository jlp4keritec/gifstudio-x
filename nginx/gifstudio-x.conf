# ============================================================================
# GifStudio-X - Configuration Nginx
# /etc/nginx/sites-available/gifstudio-x
#
# - Reverse proxy vers les conteneurs Docker (3003 web, 4003 api)
# - Basic Auth devant TOUT (mode prive C)
# - HTTPS via Let's Encrypt (cert deja existant)
# - Headers securite renforces
# - Upload max 500 Mo (matche MAX_UPLOAD_SIZE_MB de l'API)
# ============================================================================

# Redirection HTTP -> HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name gifstudio.toolspdf.net;

    # Let's Encrypt challenge
    location /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# Serveur HTTPS principal
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name gifstudio.toolspdf.net;

    # SSL (cert Let's Encrypt existant)
    ssl_certificate     /etc/letsencrypt/live/gifstudio.toolspdf.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/gifstudio.toolspdf.net/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ========================================================================
    # Basic Auth desactive (option C : login app uniquement)
    # Le fichier .htpasswd-gifstudio-x peut rester sur le serveur (inutilise).
    # Pour reactiver : decommenter les 2 directives auth_basic ci-dessous.
    # ========================================================================
    # auth_basic           "GifStudio-X (zone privee)";
    # auth_basic_user_file /etc/nginx/.htpasswd-gifstudio-x;

    # ========================================================================
    # Headers securite
    # ========================================================================
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;
    # CSP minimale pour Next.js (peut etre durci plus tard)
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; media-src 'self' blob: https:; connect-src 'self'; font-src 'self' data:;" always;

    # ========================================================================
    # Limites upload (matche MAX_UPLOAD_SIZE_MB=500 de l'API)
    # ========================================================================
    client_max_body_size 550M;
    client_body_timeout 300s;
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;

    # ========================================================================
    # API : /api/* -> conteneur api (port 4003)
    # ========================================================================
    location /api/ {
        proxy_pass http://127.0.0.1:4003;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # WebSocket support si besoin futur
        proxy_redirect off;
    }

    # ========================================================================
    # Storage statique : /storage/* -> conteneur api (port 4003)
    # (les fichiers uploades sont servis par express.static dans l'API)
    # ========================================================================
    location /storage/ {
        proxy_pass http://127.0.0.1:4003;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ========================================================================
    # Frontend : tout le reste -> conteneur web (port 3003)
    # ========================================================================
    location / {
        proxy_pass http://127.0.0.1:3003;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_redirect off;
    }

    # Logs (pour audit)
    access_log /var/log/nginx/gifstudio-x.access.log;
    error_log  /var/log/nginx/gifstudio-x.error.log;
}
