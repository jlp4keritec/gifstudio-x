name: gifstudio-x

services:
  postgres:
    image: postgres:16-alpine
    container_name: gifstudio-x-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - gifstudio-x-postgres-data:/var/lib/postgresql/data
    networks:
      - gifstudio-x-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    # Pas de port expose : reseau interne uniquement

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    image: gifstudio-x-api:latest
    container_name: gifstudio-x-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      API_PORT: 4000
      API_HOST: 0.0.0.0
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: 2h
      BCRYPT_COST: 12
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      FORCE_PASSWORD_CHANGE: ${FORCE_PASSWORD_CHANGE:-true}
      CORS_ORIGIN: ${PUBLIC_URL}
      STORAGE_ROOT: /app/apps/api/storage
      MAX_UPLOAD_SIZE_MB: ${MAX_UPLOAD_SIZE_MB:-500}
      MAX_VIDEO_DURATION_SECONDS: ${MAX_VIDEO_DURATION_SECONDS:-600}
      INSTANCE_MODE: private
      INSTANCE_NAME: gifstudio-x
      RULE34_API_KEY: ${RULE34_API_KEY:-}
      RULE34_USER_ID: ${RULE34_USER_ID:-}
    volumes:
      - ${STORAGE_PATH}:/app/apps/api/storage
    ports:
      # Expose uniquement sur localhost (Nginx du host fait le proxy)
      - "127.0.0.1:4003:4000"
    networks:
      - gifstudio-x-network
    healthcheck:
      # Utilise node (deja present dans l'image) au lieu de wget (absent de node:22-bookworm-slim).
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:4000/api/v1/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${PUBLIC_URL}/api/v1
    image: gifstudio-x-web:latest
    container_name: gifstudio-x-web
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
      NEXT_PUBLIC_API_URL: ${PUBLIC_URL}/api/v1
    ports:
      - "127.0.0.1:3003:3000"
    networks:
      - gifstudio-x-network

networks:
  gifstudio-x-network:
    name: gifstudio-x-network
    driver: bridge

volumes:
  gifstudio-x-postgres-data:
    name: gifstudio-x-postgres-data
